version: '3.8'
services:
    postgres:
        image: postgres:17-alpine
        environment: 
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${DB_NAME}
        volumes:
            - postgres-db-volume:/var/lib/postgresql/data
        ports:
          - "5432:5432"
        networks:
            - postgres-db-network
    pgadmin:
        image: dpage/pgadmin4
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
        ports:
            - "5050:80"
        volumes:
            - ./servers.json:/pgadmin4/servers.json
        networks:
            - postgres-db-network
        depends_on:
            - postgres

    
    api:
        build: 
            context: .
            dockerfile: Dockerfile
        container_name: anime_backend
        ports:
          - "4000:4000"
        environment: 
            DB_HOST: postgres
            DB_PORT: 5432
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            DB_NAME: ${DB_NAME}
            PORT: 4000
        networks:
            - postgres-db-network
        depends_on:
            - postgres


    frontend:
        build:
            context: ./anime-frontend
            dockerfile: Dockerfile
        container_name: anime_frontend
        ports:
            - "3000:3000"
        volumes:
            - ./anime-frontend:/app
            - /app/node_modules
            - /app/.next
        command: sh -c "npm install && npm run dev"
        depends_on:
            - api
        environment:
            - NODE_ENV=development
        networks:
            - postgres-db-network


volumes:
    postgres-db-volume:

    
networks:
    postgres-db-network:
        driver: bridge