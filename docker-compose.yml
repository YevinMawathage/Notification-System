version: '3.8'
services:
    postgres:
        image: postgres:17-alpine
        environment: 
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        volumes:
            - postgres-db-volume:/var/lib/postgresql/data
        ports:
          - "5432:5432"
        networks:
            - postgres-db-network
    pgadmin:
        image: dpage/pgadmin4
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
        ports:
            - "5050:80"
        volumes:
            - ./servers.json:/pgadmin4/servers.json
        networks:
            - postgres-db-network
        depends_on:
            - postgres

volumes:
    postgres-db-volume:
        driver: local
        driver_opts:
          type: none
          o: bind
          device: ./data
networks:
    postgres-db-network:
        driver: bridge