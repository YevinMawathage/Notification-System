services:
  postgres:
    image: postgres:15-alpine
    container_name: anime_db_local
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: anime_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: anime_db
    volumes:
      - postgres-dev-volume:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_local
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    depends_on:
      - postgres

volumes:
  postgres-dev-volume: